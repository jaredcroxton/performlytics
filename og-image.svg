    <path d="M16 16v32h32" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M24 38l8-8 8 8 12-14" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="82" y="48"
